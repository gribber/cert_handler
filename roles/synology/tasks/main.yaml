# restart services (list + the ones in INFO?)
# restart packages? (seems like this isnt needed, or done when restarting nginx)
# atleast, gen-all/restart nginx below does not replace certs for ftps (all isPkg = false? except system/default)
# listed in: /usr/syno/etc/certificate/_archive/INFO
# needed:
#   copy certs ({cert,fullchain,privkey}.pem) to folder of the service (/usr/syno/etc/certificate/[service]/[service]/)
#   restart service (synosystemctl restart [service]) (only for enabled services (listed with systemctl))


- name: "Regenerate certs for difference services" # only needed if using as reverse proxy?
  become: yes
  ansible.builtin.command: "/usr/syno/bin/synow3tool --gen-all"

# this will copy certs to /usr/syno/etc/certificate/system/default as well
- name: "Restart nginx"
  become: yes
  ansible.builtin.command: "/usr/syno/bin/synosystemctl restart nginx"

- name: "Remove temporary cert folder"
  ansible.builtin.file:
    path: "{{ original_user_home }}/{{ cert_dest_tmpdir }}"
    state: absent