---
- name: Ensure local destination directory exists
  ansible.builtin.file:
    path: "{{ cert_local_dest }}"
    state: directory
    mode: '0700'

- name: Find and Fetch Certificates
  block:
    - name: Search for the correct cert folder on remote host
      become: true
      ansible.builtin.shell: |
        for dir in {{ cert_source_dir }}/npm-*; do
          if [ -f "$dir/cert.pem" ]; then
            if openssl x509 -noout -subject -in "$dir/cert.pem" | grep -q "CN=.*{{ target_domain }}"; then
              echo "$dir"
              exit 0
            fi
          fi
        done
        exit 1
      register: remote_cert_path
      delegate_to: "{{ cert_source_host }}"
      remote_user: "{{ cert_source_user }}"
      changed_when: false
      failed_when: remote_cert_path.rc != 0

    - name: Set fact for the identified source directory
      ansible.builtin.set_fact:
        identified_src: "{{ remote_cert_path.stdout }}"

    - name: Fetch the .pem files from identified folder
      become: true
      ansible.builtin.fetch:
        src: "{{ identified_src }}/{{ item }}"
        dest: "{{ cert_local_dest }}/"
        flat: yes
      loop:
        - cert.pem
        - privkey.pem
        - chain.pem
        - fullchain.pem
      delegate_to: "{{ cert_source_host }}"
      remote_user: "{{ cert_source_user }}"
      register: cert_fetch_results

    - name: Set permissions on retrieved certificate files
      ansible.builtin.file:
        path: "{{ cert_local_dest }}/{{ item }}"
        mode: '0600'
      loop:
        - cert.pem
        - privkey.pem
        - chain.pem
        - fullchain.pem
      delegate_to: localhost

    - name: Show if files were actually updated
      ansible.builtin.debug:
        msg: "New certificates synchronized for {{ target_domain }} from {{ identified_src }}"
      when: cert_fetch_results.changed

    - name: Record if cert was updated
      delegate_to: localhost
      delegate_facts: true
      ansible.builtin.set_fact:
        new_certs_pulled: "{{ cert_fetch_results.changed }}"

    - name: Ensure the certificate updated marker file exists
      ansible.builtin.file:
        path: "{{ cert_marker }}"
        state: touch
        mode: '0644'
      when: cert_fetch_results.changed
      
  rescue:
    - name: Handle missing certificates
      ansible.builtin.fail:
        msg: "Could not find a certificate matching {{ target_domain }} on {{ cert_source_host }}."